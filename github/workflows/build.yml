name: build

on:
  pull_request:
    branches:
      - main

jobs:
  release:
    if: github.event_name == 'pull_request'
    steps:
      - name: Build release
        run: make release
  
  checks:
    steps:
      - name: Check code
        run: make check

      - name: Unit tests
        run: make test
  
      