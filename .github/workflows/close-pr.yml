name: Close PR

on:
  pull_request:
    branches: [release]

permissions:
  write-all

jobs:
  close_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR
        run: echo "pr fermée"

  debug_context:
    runs-on: ubuntu-latest
    run: Dump GitHub context
    env:
      GITHUB_CONTEXT: ${{ toJson(github) }}




