name: Close PR

on:
  pull_request:
    branches: [ "release" ]

permissions:
  write-all

jobs:
  close_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR
        run: echo "pr fermee"

  debug_context:
    runs-on: ubuntu-latest
    steps:
      - name: Dump GitHub context
        run: echo "$GITHUB_CONTEXT"
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}




