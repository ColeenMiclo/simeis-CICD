name: test-e2e

on:
  pull_request:
    branches:
      - release

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install python3 -y
          sudo apt-get install python3-pip -y
          pip install pytest
          pip install requests

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run E2E tests
        run: |
          python3 tests/end-to-end-test.py
        
