name: Release Artefacts

on:
  push:
    branches:
      - release

permissions:
    contents: write

jobs:
    release-artefacts:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        
        - name: Put commit hash in env variable
          run: |
                echo "GIT_HASH=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
                echo "GIT_MESSAGE<<EOF" >> $GITHUB_ENV
                git log -1 --pretty=%B >> $GITHUB_ENV
                echo "EOF" >> $GITHUB_ENV
            
        - name: Build and release artefacts
          run: |
                cargo build --release

        - name: Upload release artefacts
          uses: mini-bomba/create-github-release@v1.1.3
          with:
              token: ${{ secrets.GITHUB_TOKEN }}
              tag: latest
              prerelease: true
              name: "Release ${{ env.GIT_HASH }}"
              body: "This automatic prerelease is built from commit ${{ env.GIT_HASH }} based on commit message:\n\n${{ env.GIT_MESSAGE }}"
              files: |
                  target/release/simeis
                  README.md
                  CODEOWNERS.md
                  CHANGELOG.md

        
              

